<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDViewer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<link id="hljs-theme" rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

<style>
/* ════════════════════════════════════════
   Mantine Design Tokens
════════════════════════════════════════ */
:root {
  /* Mantine gray palette */
  --mn-gray-0: #f8f9fa;
  --mn-gray-1: #f1f3f5;
  --mn-gray-2: #e9ecef;
  --mn-gray-3: #dee2e6;
  --mn-gray-4: #ced4da;
  --mn-gray-5: #adb5bd;
  --mn-gray-6: #868e96;
  --mn-gray-7: #495057;
  --mn-gray-8: #343a40;
  --mn-gray-9: #212529;

  /* Mantine blue */
  --mn-blue-0: #e7f5ff;
  --mn-blue-4: #74c0fc;
  --mn-blue-5: #339af0;
  --mn-blue-6: #228be6;
  --mn-blue-7: #1c7ed6;
  --mn-blue-8: #1971c2;

  /* Mantine dark */
  --mn-dark-9: #101113;
  --mn-dark-8: #141517;
  --mn-dark-7: #1a1b1e;
  --mn-dark-6: #25262b;
  --mn-dark-5: #2c2e33;
  --mn-dark-4: #373a40;
  --mn-dark-3: #495057;
  --mn-dark-2: #5c5f66;
  --mn-dark-1: #909296;
  --mn-dark-0: #c1c2c5;

  /* Green */
  --mn-green-6: #40c057;

  /* Spacing */
  --sp-xs: 8px;
  --sp-sm: 12px;
  --sp-md: 16px;
  --sp-lg: 24px;
  --sp-xl: 32px;

  /* Radius */
  --radius-xs: 2px;
  --radius-sm: 4px;
  --radius-md: 8px;

  /* Shadows */
  --shadow-xs: 0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.1);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.05), 0 10px 15px -5px rgba(0,0,0,.05), 0 7px 7px -5px rgba(0,0,0,.04);

  /* Font */
  --font: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'DM Mono', 'Cascadia Code', monospace;

  /* ── Semantic: light ── */
  --bg:            var(--mn-gray-0);
  --surface:       #ffffff;
  --subtle:        var(--mn-gray-1);
  --hover:         var(--mn-gray-1);
  --border:        var(--mn-gray-3);
  --border-strong: var(--mn-gray-4);
  --text:          var(--mn-gray-9);
  --text-muted:    var(--mn-gray-6);
  --text-dimmed:   var(--mn-gray-5);
  --accent:        var(--mn-blue-6);
  --accent-h:      var(--mn-blue-7);
  --accent-light:  var(--mn-blue-0);
  --code-bg:       var(--mn-gray-1);
  --success:       var(--mn-green-6);
}

[data-theme="dark"] {
  --bg:            var(--mn-dark-8);
  --surface:       var(--mn-dark-7);
  --subtle:        var(--mn-dark-6);
  --hover:         var(--mn-dark-5);
  --border:        var(--mn-dark-4);
  --border-strong: var(--mn-dark-3);
  --text:          var(--mn-dark-0);
  --text-muted:    var(--mn-dark-1);
  --text-dimmed:   var(--mn-dark-2);
  --accent:        var(--mn-blue-4);
  --accent-h:      var(--mn-blue-5);
  --accent-light:  #1864ab20;
  --code-bg:       var(--mn-dark-6);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  transition: background .15s, color .15s;
}

/* ════════════════════════════════════════
   Mantine AppShell — Header
════════════════════════════════════════ */
#toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 var(--sp-md);
  gap: var(--sp-xs);
  z-index: 200;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.2px;
  padding-right: var(--sp-sm);
  border-right: 1px solid var(--border);
  margin-right: 2px;
  user-select: none;
  white-space: nowrap;
}

.brand-mark {
  width: 26px; height: 26px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Mantine Badge — variant="outline" */
#file-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--subtle);
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: all .15s;
}
#file-badge.on {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}
#file-badge .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

.spacer { flex: 1; min-width: 0; }

/* Stats */
#stats {
  display: none;
  align-items: center;
  gap: var(--sp-sm);
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  padding: 0 var(--sp-sm);
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
#stats .sep { color: var(--border); }

/* ── Mantine Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 32px;
  padding: 0 var(--sp-sm);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .1s, color .1s, border-color .1s;
  border: 1px solid transparent;
  white-space: nowrap;
  line-height: 1;
}

/* variant="filled" */
.btn-fill {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-fill:hover { background: var(--accent-h); border-color: var(--accent-h); }

/* variant="default" */
.btn-def {
  background: var(--surface);
  border-color: var(--border-strong);
  color: var(--text);
}
.btn-def:hover { background: var(--hover); }

/* ActionIcon — subtle */
.btn-icon {
  width: 32px;
  padding: 0;
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.btn-icon:hover { background: var(--hover); color: var(--text); }

/* ════════════════════════════════════════
   Mantine AppShell — Navbar (TOC)
════════════════════════════════════════ */
#layout {
  display: flex;
  height: 100vh;
  padding-top: 56px;
}

#toc {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: var(--sp-md) 0 var(--sp-xl);
  transition: width .2s, min-width .2s, opacity .15s;
  flex-shrink: 0;
}
#toc.closed { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; }

#toc::-webkit-scrollbar { width: 4px; }
#toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--text-dimmed);
  padding: 0 var(--sp-md) var(--sp-xs);
}

#toc-list { list-style: none; }

/* Mantine NavLink */
#toc-list a {
  display: block;
  padding: 6px var(--sp-md);
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  position: relative;
  transition: background .1s, color .1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#toc-list a::before {
  content: '';
  position: absolute;
  left: 0; top: 5px; bottom: 5px;
  width: 2px;
  border-radius: 1px;
  background: transparent;
  transition: background .15s;
}
#toc-list a:hover { background: var(--hover); color: var(--text); }
#toc-list a.active {
  background: var(--accent-light);
  color: var(--accent);
}
#toc-list a.active::before { background: var(--accent); }
#toc-list .h2 a { padding-left: 28px; }
#toc-list .h3 a { padding-left: 42px; font-size: 12px; }

/* ════════════════════════════════════════
   Main scroll area
════════════════════════════════════════ */
#scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-xl) 52px 80px;
  scroll-behavior: smooth;
}
#scroll-area::-webkit-scrollbar { width: 6px; }
#scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#scroll-area::-webkit-scrollbar-thumb:hover { background: var(--text-dimmed); }

#content { max-width: 740px; margin: 0 auto; }

/* ── Empty state ── */
#empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: var(--sp-sm);
  text-align: center;
}
.empty-icon {
  width: 58px; height: 58px;
  background: var(--subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: var(--shadow-xs);
  margin-bottom: 4px;
}
.empty-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
}
.empty-sub {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.65;
  max-width: 280px;
}
kbd {
  display: inline-block;
  background: var(--subtle);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: var(--radius-xs);
  padding: 0 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ── Drop overlay ── */
#drop-overlay {
  display: none;
  position: fixed; inset: 0;
  background: color-mix(in srgb, var(--accent) 6%, transparent);
  border: 2px dashed var(--accent);
  z-index: 300;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: var(--sp-sm);
  pointer-events: none;
}
#drop-overlay.on { display: flex; }
.drop-box {
  width: 54px; height: 54px;
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.drop-text { font-size: 15px; font-weight: 500; color: var(--accent); }

/* ════════════════════════════════════════
   Markdown — Mantine-aligned
════════════════════════════════════════ */
#content h1, #content h2, #content h3,
#content h4, #content h5, #content h6 {
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: -.3px;
  color: var(--text);
  margin-top: 2em;
  margin-bottom: .6em;
}
#content h1 {
  font-size: 1.95em;
  font-weight: 700;
  letter-spacing: -.5px;
  border-bottom: 1px solid var(--border);
  padding-bottom: .3em;
  margin-top: 0;
}
#content h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: .25em; }
#content h3 { font-size: 1.15em; }
#content h4 { font-size: 1em; }

#content p { margin-bottom: 1em; }

#content a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
  transition: border-color .1s;
}
#content a:hover { border-bottom-color: var(--accent); }

#content ul, #content ol { margin: .4em 0 1em 1.5em; }
#content li { margin: .3em 0; }

/* Mantine Blockquote */
#content blockquote {
  margin: 1.2em 0;
  padding: var(--sp-sm) var(--sp-md);
  border-left: 3px solid var(--accent);
  background: var(--accent-light);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-muted);
}
#content blockquote p { margin: 0; }

/* Mantine Code (inline) */
#content code {
  font-family: var(--font-mono);
  font-size: .875em;
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: var(--radius-xs);
  color: #e03131;
}
[data-theme="dark"] #content code { color: #ff6b6b; }

/* Mantine CodeHighlight (block) */
.code-wrapper {
  position: relative;
  margin: 1.2em 0;
}
#content pre {
  background: var(--code-bg) !important;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin: 0;
  overflow: hidden;
  box-shadow: var(--shadow-xs);
}
.code-meta {
  position: absolute;
  top: 8px;
  left: 12px;
  right: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
  z-index: 2;
}
.code-lang {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dimmed);
  opacity: 0.7;
}
.copy-btn {
  pointer-events: all;
  height: 22px;
  padding: 0 8px;
  border-radius: var(--radius-xs);
  background: var(--subtle);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: background .1s, color .1s, opacity .15s;
  opacity: 0;
}
.code-wrapper:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--hover); color: var(--text); }
.copy-btn.copied { color: var(--success); border-color: var(--success); opacity: 1; }

#content pre code {
  display: block;
  padding: 28px var(--sp-md) var(--sp-sm);
  background: none !important;
  border: none !important;
  border-radius: 0;
  color: inherit;
  font-size: .875em;
  line-height: 1.7;
  overflow-x: auto;
}

/* Mantine Table */
#content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.2em 0;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
#content th, #content td {
  padding: 9px var(--sp-sm);
  border-bottom: 1px solid var(--border);
  text-align: left;
}
#content th {
  background: var(--subtle);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .3px;
  color: var(--text-muted);
}
#content tr:last-child td { border-bottom: none; }
#content tr:hover td { background: var(--subtle); }

#content img {
  max-width: 100%;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
}
#content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2em 0;
}

/* checkbox */
#content li label { display: flex; align-items: flex-start; gap: 7px; }
#content li input[type="checkbox"] { margin-top: 4px; accent-color: var(--accent); flex-shrink: 0; }

/* Scroll-to-top ActionIcon */
#go-top {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: background .1s, color .1s;
  z-index: 50;
}
#go-top.on { display: flex; }
#go-top:hover { background: var(--hover); color: var(--text); }

/* ── Print ── */
@media print {
  #toolbar, #toc, #go-top, .code-header { display: none !important; }
  #layout { padding-top: 0; display: block; }
  #scroll-area { overflow: visible; padding: 0; }
  #content { max-width: 100%; }
  body, #content * { color: #000 !important; }
  #content a { color: #1971c2 !important; }
  #content pre, #content code { background: #f8f9fa !important; border-color: #dee2e6 !important; }
  #content blockquote { background: #e7f5ff !important; border-left-color: #228be6 !important; }
  #content th { background: #f1f3f5 !important; }
  a[href]:after { content: none !important; }
}

@media (max-width: 700px) {
  #scroll-area { padding: var(--sp-lg) var(--sp-md) 60px; }
  #toc { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<header id="toolbar">
  <div class="brand">
    <div class="brand-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="2" width="12" height="10" rx="1.5" stroke="white" stroke-width="1.3"/>
        <line x1="3.5" y1="5" x2="10.5" y2="5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="3.5" y1="7.5" x2="10.5" y2="7.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="3.5" y1="10" x2="7.5" y2="10" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    MDViewer
  </div>

  <span id="file-badge">
    <span class="dot"></span>
    <span id="file-name">파일 없음</span>
  </span>

  <div class="spacer"></div>

  <div id="stats">
    <span id="s-words">—</span>
    <span class="sep">·</span>
    <span id="s-time">—</span>
  </div>

  <button class="btn btn-fill" onclick="openFile()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M1.5 9.5V11H11.5V9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M6.5 2V8.5M6.5 2L4.2 4.3M6.5 2L8.8 4.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    파일 열기
  </button>

  <button id="btn-print" class="btn btn-def" onclick="printDoc()" style="display:none" title="⌘P">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <rect x="1.5" y="5" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <path d="M3.5 5V3a.8.8 0 01.8-.8h4.4a.8.8 0 01.8.8v2" stroke="currentColor" stroke-width="1.3"/>
      <circle cx="9.5" cy="7.8" r=".7" fill="currentColor"/>
    </svg>
    인쇄
  </button>

  <button id="btn-export" class="btn btn-def" onclick="exportHtml()" style="display:none">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M8 1.5H3a1 1 0 00-1 1v8a1 1 0 001 1h7a1 1 0 001-1V5L8 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      <path d="M8 1.5V5H11.5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    </svg>
    내보내기
  </button>

  <button class="btn btn-icon" onclick="toggleToc()" title="목차">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <line x1="3" y1="4.5" x2="12" y2="4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="3" y1="7.5" x2="12" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="3" y1="10.5" x2="8" y2="10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
  </button>

  <button id="btn-theme" class="btn btn-icon" onclick="toggleTheme()" title="시스템 테마">
    <svg id="ic-auto" width="15" height="15" viewBox="0 0 15 15" fill="none">
      <rect x="1.5" y="2" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <line x1="5.5" y1="10" x2="5" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="9.5" y1="10" x2="10" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="4.5" y1="13" x2="10.5" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <svg id="ic-moon" width="15" height="15" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">

<!-- Drop overlay -->
<div id="drop-overlay">
  <div class="drop-box">📄</div>
  <div class="drop-text">여기에 놓으세요</div>
</div>

<!-- Layout -->
<div id="layout">
  <nav id="toc">
    <div class="toc-label">목차</div>
    <ul id="toc-list"></ul>
  </nav>

  <div id="scroll-area"
       ondragover="onDragOver(event)"
       ondragleave="onDragLeave()"
       ondrop="onDrop(event)">
    <div id="content">
      <div id="empty">
        <div class="empty-icon">📄</div>
        <div class="empty-title">열린 파일 없음</div>
        <div class="empty-sub">
          <strong>파일 열기</strong>를 클릭하거나<br>
          이 창에 파일을 드래그 앤 드롭하세요<br><br>
          <kbd>.md</kbd>&nbsp; <kbd>.markdown</kbd>
        </div>
      </div>
    </div>
  </div>
</div>

<button id="go-top" onclick="goTop()" title="맨 위로">↑</button>

<script>
/* ── marked renderer ── */
const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const langId = lang ? lang.split(/[\s{]/)[0] : '';
  const hl = (langId && hljs.getLanguage(langId))
    ? hljs.highlight(code, { language: langId }).value
    : hljs.highlightAuto(code).value;
  return `<div class="code-wrapper">
    <div class="code-meta">
      <span class="code-lang">${langId || ''}</span>
      <button class="copy-btn" onclick="copyCode(this)">복사</button>
    </div>
    <pre><code class="hljs">${hl}</code></pre>
  </div>`;
};
marked.setOptions({ renderer, breaks: true, gfm: true });

/* ── State ── */
let md = '';
let tocOpen = true;
let theme = localStorage.getItem('theme') || 'auto'; // 'auto' | 'light' | 'dark'
const sysDark = window.matchMedia('(prefers-color-scheme: dark)');

/* ── pywebview ── */
async function openFile() {
  try {
    const data = JSON.parse(await window.pywebview.api.open_file_dialog());
    if (data.content !== undefined) load(data);
  } catch(e) { console.error(e); }
}

function loadMarkdownData(data) { load(data); }

function load(data) {
  if (data.error)     { alert('파일 오류: ' + data.error); return; }
  if (data.cancelled) return;
  md = data.content;
  render(data.content, data.filename);
}

/* ── Render ── */
function render(text, filename) {
  const el = document.getElementById('content');
  el.innerHTML = marked.parse(text);

  // checkbox
  el.querySelectorAll('li').forEach(li => {
    const t = li.textContent;
    if (/^\[[ x]\] /.test(t)) {
      const checked = t.startsWith('[x]');
      li.innerHTML = `<label><input type="checkbox" ${checked?'checked':''} disabled>${li.innerHTML.replace(/^\[.\] /,'')}</label>`;
    }
  });

  // file badge
  document.getElementById('file-name').textContent = filename || 'untitled.md';
  document.getElementById('file-badge').classList.add('on');

  stats(text);
  buildToc();
  document.getElementById('btn-print').style.display  = '';
  document.getElementById('btn-export').style.display = '';
}

function stats(text) {
  const w = text.trim().split(/\s+/).filter(Boolean).length;
  const m = Math.max(1, Math.round(w / 200));
  document.getElementById('s-words').textContent = w.toLocaleString() + ' 단어';
  document.getElementById('s-time').textContent  = `약 ${m}분`;
  document.getElementById('stats').style.display = 'flex';
}

/* ── TOC ── */
function buildToc() {
  const hs   = document.querySelectorAll('#content h1,#content h2,#content h3');
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  hs.forEach((h, i) => {
    h.id = 'h' + i;
    const li = document.createElement('li');
    li.className = h.tagName.toLowerCase();
    const a  = document.createElement('a');
    a.href        = '#h' + i;
    a.textContent = h.textContent;
    a.onclick = e => { e.preventDefault(); h.scrollIntoView({ behavior:'smooth', block:'start' }); };
    li.appendChild(a);
    list.appendChild(li);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  applyTheme();

  const sa = document.getElementById('scroll-area');
  sa.addEventListener('scroll', () => {
    document.getElementById('go-top').classList.toggle('on', sa.scrollTop > 300);
    const hs = document.querySelectorAll('#content h1,#content h2,#content h3');
    let cur = '';
    hs.forEach(h => { if (h.offsetTop - 80 <= sa.scrollTop) cur = h.id; });
    document.querySelectorAll('#toc-list a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + cur);
    });
  });
});

/* ── Actions ── */
function toggleToc()   { tocOpen = !tocOpen; document.getElementById('toc').classList.toggle('closed', !tocOpen); }
function goTop()       { document.getElementById('scroll-area').scrollTo({ top:0, behavior:'smooth' }); }
function printDoc()    { window.print(); }

function copyCode(btn) {
  const code = btn.closest('.code-wrapper').querySelector('code');
  navigator.clipboard.writeText(code?.innerText || '');
  btn.textContent = '✓ 복사됨';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
}

function applyTheme() {
  const isDark = theme === 'dark' || (theme === 'auto' && sysDark.matches);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('ic-auto').style.display = theme === 'auto'  ? '' : 'none';
  document.getElementById('ic-moon').style.display = theme === 'dark'  ? '' : 'none';
  document.getElementById('ic-sun').style.display  = theme === 'light' ? '' : 'none';
  document.getElementById('hljs-theme').href = isDark
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  const labels = { auto: '시스템 테마', light: '밝게', dark: '어둡게' };
  document.getElementById('btn-theme').title = labels[theme];
}

function toggleTheme() {
  theme = { auto: 'light', light: 'dark', dark: 'auto' }[theme];
  localStorage.setItem('theme', theme);
  applyTheme();
}

sysDark.addEventListener('change', () => { if (theme === 'auto') applyTheme(); });

function exportHtml() {
  const fname = document.getElementById('file-name').textContent.replace(/\.md$/i,'');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${fname}</title>
<style>
body{max-width:740px;margin:48px auto;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.75;color:#212529;padding:0 20px}
h1,h2,h3,h4{font-weight:600;letter-spacing:-.3px;margin-top:2em;margin-bottom:.6em}
h1{font-size:1.95em;font-weight:700;border-bottom:1px solid #dee2e6;padding-bottom:.3em;margin-top:0}
h2{font-size:1.4em;border-bottom:1px solid #dee2e6;padding-bottom:.25em}
a{color:#228be6;text-decoration:none;border-bottom:1px solid #74c0fc}
code{background:#f1f3f5;border:1px solid #dee2e6;padding:1px 6px;border-radius:2px;font-size:.875em}
pre{background:#f1f3f5;border:1px solid #dee2e6;border-radius:8px;padding:16px;overflow:auto;margin:1.2em 0}
pre code{background:none;border:none;padding:0}
blockquote{border-left:3px solid #228be6;margin:1.2em 0;padding:8px 16px;background:#e7f5ff;border-radius:0 4px 4px 0;color:#495057}
blockquote p{margin:0}
table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid #dee2e6;border-radius:4px;overflow:hidden;margin:1.2em 0}
th,td{padding:9px 12px;border-bottom:1px solid #dee2e6;text-align:left}
th{background:#f1f3f5;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:#868e96;font-weight:600}
tr:last-child td{border-bottom:none}
img{max-width:100%;border-radius:8px;border:1px solid #dee2e6}
hr{border:none;border-top:1px solid #dee2e6;margin:2em 0}
</style></head><body>${document.getElementById('content').innerHTML}</body></html>`;
  const url = URL.createObjectURL(new Blob([html], {type:'text/html'}));
  const a = document.createElement('a');
  a.href = url;
  a.download = fname + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

/* ── Drag & Drop ── */
function onDragOver(e) { e.preventDefault(); document.getElementById('drop-overlay').classList.add('on'); }
function onDragLeave()  { document.getElementById('drop-overlay').classList.remove('on'); }
async function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('on');
  const f = e.dataTransfer.files[0];
  if (f) load({ content: await f.text(), filename: f.name });
}

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  const m = e.metaKey || e.ctrlKey;
  if (m && e.key === 'p') { e.preventDefault(); if (md) printDoc(); }
  if (m && e.key === 'o') { e.preventDefault(); openFile(); }
});
</script>
</body>
</html>
